# ============================================================
# 后端 & AI 工程师依赖清单 (Backend & AI Dependencies)
# 项目名称: 服装推荐系统 - 后端/AI
# 语言: Python
# ============================================================

backend:
  name: "dress-recommendation-backend"
  version: "0.0.1"
  description: "AI-powered dress recommendation system backend"
  language: "Python"
  
  # ============================================================
  # Python 环境要求
  # ============================================================
  python_version: ">=3.8.0"        # 推荐 3.9.x、3.10.x、3.11.x
  python_version_recommended: "3.11.x"
  
  # ============================================================
  # Web 框架 (选其一)
  # ============================================================
  web_framework:
    option_1:
      name: "FastAPI"
      version: "^0.104.1"
      package: "fastapi"
      description: "现代化高性能 Python Web 框架"
      recommended: true
      install: "pip install fastapi uvicorn"
      usage: "REST API 开发、异步支持、自动 API 文档"
    
    option_2:
      name: "Django"
      version: "^4.2.0"
      package: "django"
      description: "全功能 Python Web 框架"
      recommended: false
      install: "pip install django djangorestframework"
      usage: "大型项目、ORM、后台管理"

    option_3:
      name: "Flask"
      version: "^3.0.0"
      package: "flask"
      description: "轻量级 Python Web 框架"
      recommended: false
      install: "pip install flask flask-cors"
      usage: "小型项目、快速原型开发"

  # ============================================================
  # 核心依赖 (Core Dependencies)
  # ============================================================
  dependencies:
    # Web 框架相关
    fastapi:
      version: "^0.104.1"
      description: "现代化异步 Web 框架"
      usage: "API 服务主框架"

    uvicorn:
      version: "^0.24.0"
      description: "ASGI 服务器"
      usage: "运行 FastAPI 应用"

    pydantic:
      version: "^2.5.0"
      description: "数据验证库"
      usage: "请求/响应数据验证"

    # AI/ML 核心库
    numpy:
      version: "^1.24.0"
      description: "数值计算库"
      usage: "矩阵操作、数值计算基础"

    opencv-python:
      version: "^4.8.0"
      description: "图像处理库"
      usage: "身材分析、图像处理、特征提取"

    pillow:
      version: "^10.0.0"
      description: "Python 图像库"
      usage: "图像操作、格式转换"

    scikit-learn:
      version: "^1.3.0"
      description: "机器学习库"
      usage: "身材分类、推荐算法"

    tensorflow:
      version: "^2.13.0"
      description: "深度学习框架"
      usage: "人体检测、关键点识别（可选）"
      note: "可选，体积较大；也可用 mediapipe 代替"

    torch:
      version: "^2.1.0"
      description: "PyTorch 深度学习框架"
      usage: "神经网络模型、人体姿态识别（可选）"
      note: "与 TensorFlow 二选一，或仅用于特定模型"

    mediapipe:
      version: "^0.10.0"
      description: "谷歌 ML 解决方案库"
      usage: "人体检测、姿态估计（推荐，轻量级）"

    pandas:
      version: "^2.1.0"
      description: "数据分析库"
      usage: "数据处理、特征工程"

    # 数据库
    sqlalchemy:
      version: "^2.0.0"
      description: "Python ORM"
      usage: "数据库操作、数据模型定义"

    psycopg2-binary:
      version: "^2.9.9"
      description: "PostgreSQL 数据库驱动"
      usage: "PostgreSQL 连接（如果使用 PostgreSQL）"

    pymysql:
      version: "^1.1.0"
      description: "MySQL 数据库驱动"
      usage: "MySQL 连接（如果使用 MySQL）"

    # 百度 AI API
    baidu-aip:
      version: "^4.16.0"
      package: "baidu-aip"
      description: "百度 AI 开放平台 SDK"
      usage: "身体检测、人脸识别等百度 AI 服务"
      install: "pip install baidu-aip"

    # 其他常用库
    requests:
      version: "^2.31.0"
      description: "HTTP 请求库"
      usage: "调用第三方 API"

    python-dotenv:
      version: "^1.0.0"
      description: "环境变量管理"
      usage: "加载 .env 配置文件"

    python-multipart:
      version: "^0.0.6"
      description: "多部分表单处理"
      usage: "文件上传处理"

    # CORS 跨域处理
    python-cors:
      version: "^4.0.0"
      package: "fastapi-cors"
      description: "CORS 中间件"
      usage: "前后端跨域请求支持"

  # ============================================================
  # 开发依赖 (Development Dependencies)
  # ============================================================
  devDependencies:
    pytest:
      version: "^7.4.0"
      description: "Python 测试框架"
      usage: "单元测试、集成测试"

    black:
      version: "^23.11.0"
      description: "Python 代码格式化工具"
      usage: "代码风格统一"

    flake8:
      version: "^6.1.0"
      description: "Python 代码检查工具"
      usage: "代码质量检查"

    mypy:
      version: "^1.7.0"
      description: "Python 静态类型检查"
      usage: "类型检查"

    jupyter:
      version: "^1.0.0"
      description: "交互式笔记本"
      usage: "数据分析、模型实验"

  # ============================================================
  # Python 环境配置建议
  # ============================================================
  environment_setup:
    method_1:
      name: "使用 venv (标准推荐)"
      description: "Python 内置虚拟环境"
      steps:
        - "python -m venv venv"
        - "Windows: .\\venv\\Scripts\\activate"
        - "macOS/Linux: source venv/bin/activate"
        - "pip install -r requirements.txt"

    method_2:
      name: "使用 conda (科学计算推荐)"
      description: "Conda 包管理和环境隔离"
      steps:
        - "conda create -n dress-ai python=3.11"
        - "conda activate dress-ai"
        - "pip install -r requirements.txt"

    method_3:
      name: "使用 Poetry (项目管理推荐)"
      description: "现代 Python 依赖管理工具"
      steps:
        - "poetry install"
        - "poetry run python main.py"

  # ============================================================
  # 快速开始
  # ============================================================
  quickstart:
    create_env: "python -m venv venv"
    activate_env: "venv\\Scripts\\activate  # Windows"
    install_deps: "pip install -r requirements.txt"
    run_server: "uvicorn main:app --reload  # FastAPI"
    server_url: "http://localhost:8000"
    docs_url: "http://localhost:8000/docs  # Swagger UI"

  # ============================================================
  # 百度 AI API 密钥配置
  # ============================================================
  baidu_ai_config:
    app_id: "请从百度开放平台申请"
    api_key: "请从百度开放平台申请"
    secret_key: "请从百度开放平台申请"
    config_location: ".env 文件或环境变量"
    example:
      - "BAIDU_APP_ID=your_app_id"
      - "BAIDU_API_KEY=your_api_key"
      - "BAIDU_SECRET_KEY=your_secret_key"

  # ============================================================
  # 前后端接口约定
  # ============================================================
  frontend_api:
    base_url: "http://localhost:8000"
    endpoints:
      - "POST   /api/auth/login          # 用户登录"
      - "POST   /api/auth/register       # 用户注册"
      - "POST   /api/user/profile        # 保存用户资料"
      - "POST   /api/photo/analyze       # 分析上传照片（调用 AI）"
      - "GET    /api/recommendations     # 返回推荐商品列表"
      - "GET    /api/analysis-result     # 获取分析结果详情"

  # ============================================================
  # GPU 支持 (可选，用于深度学习加速)
  # ============================================================
  gpu_support:
    cuda_version: "12.1"
    cudnn_version: "8.7"
    gpu_libraries:
      tensorflow_gpu:
        package: "tensorflow[and-cuda]"
        version: "^2.13.0"
      torch_cuda:
        package: "torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118"
        version: "2.1.0"
    note: "可选，取决于模型复杂度和硬件条件"
